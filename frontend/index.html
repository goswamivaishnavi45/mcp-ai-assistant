<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f14;
    --panel: #121821;
    --panel-2: #0e141c;
    --line: #223041;
    --text: #e7edf3;
    --muted: #7c8b9a;
    --signal: #5eead4;
    --signal-dim: #2c5a54;
    --amber: #f5b942;
    --radius: 10px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
  }

  /* ---- Left rail: protocol graph ---- */
  .rail {
    background: var(--panel-2);
    border-right: 1px solid var(--line);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    overflow-y: auto;
  }
  .brand {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .brand strong {
    display: block;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: 0;
    color: var(--text);
    margin-top: 4px;
  }
  .graph {
    position: relative;
    padding-left: 14px;
  }
  .graph::before {
    content: '';
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 1px;
    background: linear-gradient(var(--signal-dim), var(--line));
  }
  .node {
    position: relative;
    padding: 12px 0 12px 20px;
    border-radius: var(--radius);
  }
  .node::before {
    content: '';
    position: absolute;
    left: -4px;
    top: 18px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--signal-dim);
    border: 2px solid var(--panel-2);
    transition: background 0.25s, box-shadow 0.25s;
  }
  .node.active::before {
    background: var(--signal);
    box-shadow: 0 0 0 4px rgba(94,234,212,0.15);
  }
  .node-server {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--signal);
    margin-bottom: 2px;
  }
  .node-name {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .node-desc {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  .status {
    margin-top: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--signal); }

  /* ---- Main chat ---- */
  .main {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .chat-header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .msg { max-width: 70%; line-height: 1.55; font-size: 14.5px; }
  .msg.user { align-self: flex-end; }
  .msg.model { align-self: flex-start; }
  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
  }
  .msg.user .bubble { background: var(--signal); color: #06201c; border-bottom-right-radius: 3px; }
  .msg.model .bubble { background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 3px; }

  .tool-trace {
    align-self: flex-start;
    max-width: 70%;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    background: var(--panel-2);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 10px 14px;
  }
  .tool-trace .line { margin-bottom: 4px; }
  .tool-trace .tool-name { color: var(--amber); }

  .composer {
    border-top: 1px solid var(--line);
    padding: 16px 28px 22px;
    display: flex;
    gap: 10px;
  }
  .composer input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
  }
  .composer input:focus { border-color: var(--signal); }
  .composer button {
    background: var(--signal);
    color: #06201c;
    border: none;
    border-radius: var(--radius);
    padding: 0 20px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .composer button:disabled { opacity: 0.5; cursor: default; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
</style>
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="brand">Model Context Protocol<strong>Assistant</strong></div>
      <div class="graph" id="graph"><!-- tool nodes injected here --></div>
      <div class="status"><span class="dot"></span><span id="status-text">connecting…</span></div>
    </aside>

    <main class="main">
      <div class="chat-header">One protocol → web search + sandboxed filesystem, routed live through Gemini</div>
      <div class="chat-log" id="log"></div>
      <form class="composer" id="composer">
        <input id="input" type="text" placeholder="Ask something…" autocomplete="off" />
        <button type="submit" id="send-btn">Send</button>
      </form>
    </main>
  </div>

<script>
const log = document.getElementById('log');
const graph = document.getElementById('graph');
const statusText = document.getElementById('status-text');
const form = document.getElementById('composer');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

let history = []; // [{role, text}]
let toolNodes = {}; // namespaced tool name -> DOM node

async function loadTools() {
  try {
    const res = await fetch('/api/tools');
    const data = await res.json();
    graph.innerHTML = '';
    data.tools.forEach(t => {
      const node = document.createElement('div');
      node.className = 'node';
      node.innerHTML = `
        <div class="node-server">${t.server}</div>
        <div class="node-name">${t.name.split('.').slice(1).join('.')}</div>
        <div class="node-desc">${t.description}</div>
      `;
      graph.appendChild(node);
      toolNodes[t.name] = node;
    });
    statusText.textContent = `${data.tools.length} tools online`;
  } catch (e) {
    statusText.textContent = 'backend unreachable';
  }
}

function pulseTool(name) {
  const node = toolNodes[name];
  if (!node) return;
  node.classList.add('active');
  setTimeout(() => node.classList.remove('active'), 1400);
}

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  el.appendChild(bubble);
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function addToolTrace(toolCalls) {
  if (!toolCalls || toolCalls.length === 0) return;
  const el = document.createElement('div');
  el.className = 'tool-trace';
  el.innerHTML = toolCalls.map(tc =>
    `<div class="line">→ <span class="tool-name">${tc.tool}</span>(${JSON.stringify(tc.args)})</div>`
  ).join('');
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  toolCalls.forEach(tc => pulseTool(tc.tool));
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;

  addMessage('user', message);
  input.value = '';
  sendBtn.disabled = true;
  statusText.textContent = 'thinking…';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history })
    });
    const data = await res.json();

    addToolTrace(data.tool_calls);
    addMessage('model', data.reply);

    history.push({ role: 'user', text: message });
    history.push({ role: 'model', text: data.reply });
  } catch (err) {
    addMessage('model', 'Something went wrong reaching the backend.');
  } finally {
    sendBtn.disabled = false;
    statusText.textContent = `${Object.keys(toolNodes).length} tools online`;
    input.focus();
  }
});

loadTools();
addMessage('model', "Hi — I'm connected to web search and a sandboxed filesystem over MCP. Ask me to look something up or manage a file, and watch the left panel light up.");
</script>
</body>
</html>
